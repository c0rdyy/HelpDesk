repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff lint (backend)
        entry: uv run ruff check --fix
        language: system
        types: [python]
        files: ^backend/.*\.py$
        pass_filenames: true

      - id: ruff-format
        name: ruff format (backend)
        entry: uv run ruff format
        language: system
        types: [python]
        files: ^backend/.*\.py$
        pass_filenames: true

      - id: mypy
        name: mypy (backend)
        entry: uv run mypy
        language: system
        types: [python]
        files: ^backend/.*\.py$
        pass_filenames: true 
        args: ["--ignore-missing-imports"]

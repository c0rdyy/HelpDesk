services:
  db:
    image: postgres:latest
    container_name: postgres_helpdesk
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_password
      POSTGRES_DB: helpdesk_db
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d helpdesk_db"]
      interval: 30s
      timeout: 10s
      retries: 5


volumes:
  pgdata:
    driver: local
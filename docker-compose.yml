services:
  db:
    image: postgres:16-alpine
    container_name: helpdesk-db
    environment:
      POSTGRES_DB: helpdesk
      POSTGRES_USER: helpdesk
      POSTGRES_PASSWORD: helpdesk_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helpdesk -d helpdesk"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: helpdesk-backend
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: helpdesk
      POSTGRES_PASSWORD: helpdesk_password
      POSTGRES_DB: helpdesk

      JWT_SECRET: change_me_to_long_random_secret
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TTL_MINUTES: 30
      JWT_REFRESH_TTL_DAYS: 7
      JWT_REFRESH_REMEMBER_TTL_DAYS: 30

      REFRESH_COOKIE_SECURE: "false"
      REFRESH_COOKIE_SAMESITE: lax
      REFRESH_COOKIE_PATH: /api/auth
      BACKEND_CORS_ORIGINS: ""
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    container_name: helpdesk-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data: